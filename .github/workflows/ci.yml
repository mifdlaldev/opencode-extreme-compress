name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test + Type Check + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Run all tests
        run: bun test

      - name: Run hallucination resistance tests (BLOCKING)
        run: bun run test:hallucination

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -s dist/index.js || (echo "dist/index.js empty" && exit 1)
          echo "Build output OK ($(wc -c < dist/index.js) bytes)"

      - name: Verify install scripts
        run: |
          bash -n scripts/install.sh
          bash -n scripts/uninstall.sh
